name: Date Curator MVP CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Run Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Tests
        run: pytest tests/

  build-and-push:
    name: Build Docker Image and Push
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        # GitHub Secrets에 DOCKERHUB_USERNAME, DOCKERHUB_TOKEN 이 등록되어 있어야 작동합니다.
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/suwon-date-curator:latest

  deploy:
    name: Deploy to Self-hosted Runner (Local PC)
    needs: build-and-push
    # 사용자님 로컬 PC에 Self-hosted Runner가 켜져 있어야 합니다.
    runs-on: self-hosted
    steps:
      - name: Pull latest Docker image from Docker Hub
        shell: powershell
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/suwon-date-curator:latest

      - name: Stop and remove existing container (if running)
        shell: powershell
        run: |
          # 기존에 실행 중인 컨테이너가 있으면 멈추고 삭제합니다. 없어도 에러 없이 넘어갑니다.
          $containerName = "suwon_app"
          $existing = docker ps -a --filter "name=$containerName" --format "{{.Names}}"
          if ($existing -eq $containerName) {
            Write-Host "기존 컨테이너 발견! 중지 및 제거 중..."
            docker stop $containerName
            docker rm $containerName
          } else {
            Write-Host "실행 중인 기존 컨테이너 없음. 바로 신규 배포를 진행합니다."
          }

      - name: Run new container with latest image
        shell: powershell
        run: |
          # Gemini API 키는 GitHub Secrets에서 런타임에 안전하게 주입됩니다.
          docker run -d `
            -p 8000:8000 `
            --name suwon_app `
            --restart unless-stopped `
            -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} `
            ${{ secrets.DOCKERHUB_USERNAME }}/suwon-date-curator:latest
          Write-Host "✅ 새 컨테이너가 포트 8000에서 성공적으로 실행되었습니다!"
